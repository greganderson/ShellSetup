# Extra autostart processes
# exec-once = uwsm-app -- my-service

# I'm pretty sure `--class brave-work` isn't supposed to open a tab called "brave-work - Brave",
# but it does. Which means the title is set to that. Which means I can select off the title
# to place the window in the right workspace.
exec-once = uwsm-app -- brave --class brave-work --profile-directory="Default"
exec-once = uwsm-app -- alacritty --class ws1-term
exec-once = uwsm-app -- alacritty --class ws2-term
exec-once = uwsm-app -- alacritty --class ws3-term
exec-once = uwsm-app -- alacritty --class ws5-term
# exec-once = uwsm-app -- chromium --class ws2-chromium
# exec-once = uwsm-app -- chromium --class ws5-chromium
exec-once = uwsm-app -- brave --class brave-personal --profile-directory="Profile 1"
exec-once = uwsm-app -- /usr/bin/Telegram
exec-once = uwsm-app -- slack
exec-once = uwsm-app -- obsidian

# This is a little hacky, but it works.
# not anymore!
windowrule = workspace 1, match:class ^(ws1-term)$

# Codegrinder
windowrule = workspace 2, match:class ^(ws5-term)$

# Telegram, WebBBQ, Slack
windowrule = workspace 3, match:class ^(org.telegram.desktop)$
windowrule = workspace 3 silent, match:class ^(org.telegram.desktop)$
windowrule = workspace 3, match:class ^(ws3-term)$
windowrule = workspace 3, match:class ^(Slack)$

windowrule = workspace 4, match:class ^(obsidian)$
windowrule = workspace 4, match:title ^brave-work - Brave$

# Personal work
windowrule = workspace 5, match:class ^(ws2-term)$
windowrule = workspace 5, match:title ^ws2-chromium - Chromium$
windowrule = workspace 5, match:title ^brave-personal - Brave$
